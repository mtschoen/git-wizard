name: aislop
# Quality gate for AI-generated slop patterns (https://github.com/scanaislop/aislop).
# `aislop ci` scores the whole repo (0-100) and exits non-zero when the score
# drops below ci.failBelow in .aislop/config.yml — gating the PR/push.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: aislop quality gate
        run: npx --yes aislop@0.9.4 ci .
