name: aislop
# Quality gate for AI-generated slop patterns (https://github.com/scanaislop/aislop).
# `aislop ci` scores the whole repo (0-100) and exits non-zero when the score
# drops below ci.failBelow (100) in .aislop/config.yml - gating the PR/push.
#
# The C# engine lives ONLY in the personal fork github.com/mtschoen/aislop (the
# public npm `aislop` scores just the Python ci/ tooling), so we clone + build
# that fork at a PINNED commit and run the built CLI. The C# lint engine shells
# out to the `roslynator` and `jb` (ReSharper CLT) dotnet global tools, so dotnet,
# roslynator, and jb are set up here, and the solution is restored so jb inspectcode
# can build it. Bump AISLOP_FORK_COMMIT deliberately; do not track the moving branch.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # github.com/mtschoen/aislop @ schoen/main 2026-07-11: central exclude
  # post-filter (build-backed C#/C++ engines previously bypassed config
  # excludes, so the external/MFTLib submodule leaked into the scan),
  # depth-aware countParams, record param counting. Pinned by commit, not a
  # published version - the registry publish route is retired.
  AISLOP_FORK_COMMIT: 58baba50e6f61a8808bbd2b897bd134e841904ee

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install C# lint engines (roslynator + jb / ReSharper CLT)
        run: |
          dotnet tool install -g roslynator.dotnet.cli
          dotnet tool install -g JetBrains.ReSharper.GlobalTools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Build C#-capable aislop (pinned fork commit)
        # Cloned outside the workspace so aislop does not scan the fork's own source.
        run: |
          git clone https://github.com/mtschoen/aislop.git "$RUNNER_TEMP/aislop"
          git -C "$RUNNER_TEMP/aislop" checkout "$AISLOP_FORK_COMMIT"
          (cd "$RUNNER_TEMP/aislop" && npm install --no-audit --no-fund)
      # MFTLib types must resolve for jb/roslynator to load the solution; managed-only
      # is enough for analysis (no native build here - the copy target only warns).
      - name: Build MFTLib managed (HintPath for analysis)
        run: dotnet build external/MFTLib/MFTLib/MFTLib.csproj -c Release -p:Platform=x64
      - name: Restore git-wizard (jb inspectcode builds the solution it targets)
        run: dotnet restore git-wizard.slnx
      - name: aislop quality gate
        # Sanity-fail if the C# engine did not actually analyze the .cs tree (avoid a
        # silent Python-only pass): require a healthy file count alongside the score gate.
        run: |
          REPORT="$RUNNER_TEMP/aislop-report.json"
          node "$RUNNER_TEMP/aislop/dist/cli.js" ci . --json > "$REPORT" || GATE_FAILED=1
          node -e "const r=require(process.env.REPORT); const f=r.summary?.files??0; console.log('aislop score',r.score,'over',f,'files'); if(f<10){console.error('aislop only scanned '+f+' files - the C# engine did not run');process.exit(1);}"
          if [ -n "$GATE_FAILED" ]; then echo "aislop score below failBelow"; exit 1; fi
        env:
          REPORT: ${{ runner.temp }}/aislop-report.json
